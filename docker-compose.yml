version: "3.9"

# ============================================================
# AI Mafia Online — docker-compose.yml
# 관리자: Claude AI (기획자 + 인프라 엔지니어)
# Dockerfile 작성: Cursor(backend), Gemini(frontend)
# ============================================================

services:

  # ----------------------------------------------------------
  # Redis — 세션 메모리 / LangGraph Checkpointer
  # ----------------------------------------------------------
  redis:
    image: redis:7-alpine
    container_name: mafia-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  # ----------------------------------------------------------
  # Backend — FastAPI + LangGraph + LangChain
  # Dockerfile: Dockerfile (루트, Cursor 담당)
  # ----------------------------------------------------------
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: mafia-backend
    env_file:
      - .env
    ports:
      - "${PORT:-8000}:${PORT:-8000}"
    volumes:
      - ./backend:/app/backend
      - chroma_data:/app/backend/rag/chroma_db
    depends_on:
      redis:
        condition: service_healthy
    environment:
      - REDIS_URL=redis://redis:6379
    restart: unless-stopped

  # ----------------------------------------------------------
  # Frontend — Streamlit
  # Dockerfile: frontend/Dockerfile (Gemini 담당)
  # ----------------------------------------------------------
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: mafia-frontend
    ports:
      - "8501:8501"
    environment:
      - BACKEND_URL=http://backend:8000
      - WS_URL=ws://backend:8000
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  chroma_data:
    driver: local
